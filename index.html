<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lampedusa · 9–15 Agosto 2026</title>
  <meta name="description" content="Pianificatore di viaggio per Lampedusa: budget, voli, itinerario, documenti, ristoranti, aperitivi e spiagge." />
  <meta name="theme-color" content="#06303e" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏝️</text></svg>" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#06303e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 18c1.5 0 2-1 3.5-1s2 1 3.5 1 2-1 3.5-1 2 1 3.5 1 2-1 3.5-1" />
            <path d="M12 13V4M12 4c2.5 0 4 1.5 4 3.5M12 4C9.5 4 8 5.5 8 7.5" />
          </svg>
        </div>
        <div>
          <b>Lampedusa</b>
          <span>9–15 ago 2026</span>
        </div>
      </div>

      <nav class="nav" id="nav"><!-- popolata da app.js --></nav>

      <div class="side-foot" id="storageNote">
        <div><span class="storage-dot" id="storageDot"></span><span id="storageText">Dati su questo dispositivo</span></div>
        <div style="margin-top:7px"><span class="storage-dot" id="syncDot" style="background:#7d949b"></span><span id="syncText">Solo questo dispositivo</span></div>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <button class="hamburger" id="menuBtn" aria-label="Apri menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <b>Lampedusa</b>
      </div>
      <div id="view" class="view"><!-- render dinamico --></div>
    </main>
  </div>

  <!-- Modale riutilizzabile -->
  <div class="modal-bg" id="modalBg">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modalTitle">Titolo</h3>
        <button class="x" id="modalClose" aria-label="Chiudi">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot">
        <button class="btn ghost" id="modalCancel">Annulla</button>
        <button class="btn primary" id="modalSave">Salva</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Sincronizzazione cloud (opzionale). Se firebase-config.js non è configurato,
       l'app funziona comunque in locale su questo dispositivo. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
